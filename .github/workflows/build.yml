name: Build Flet App 0.19.0

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Flet
        run: |
          pip install flet==0.19.0
          # تثبيت متطلبات البناء
          flet build apk --help

      - name: Clean and Build
        run: |
          # 1. مسح المجلدات المؤقتة التي قد تحمل إعدادات قديمة
          rm -rf .flet
          
          # 2. عملية البناء مع تحديد الاسم بشكل صريح
          # --product-name يؤثر على اسم التطبيق الظاهر في النظام
          flet build apk --product-name "اسمك_الجديد"
          
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: app-release
          # المسار الافتراضي للبناء في Flet
          path: build/apk/app-release.apk
