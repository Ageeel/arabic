name: Build Flet App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. تحديث نسخة Checkout إلى v4
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. إعداد بيئة Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. تثبيت المكتبات اللازمة
      - name: Install dependencies
        run: |
          pip install flet==0.19.0
          pip install flet-builder

      # 4. عملية البناء مع تغيير الاسم
      - name: Build Android App
        run: |
          # تنظيف أي بقايا من عمليات بناء سابقة
          rm -rf .flet
          
          # البناء مع تغيير الاسم الظاهر للمستخدم إلى "تطبيقي"
          flet build apk --product-name "MyArabicApp" --display-name "تطبيقي"

      # 5. رفع ملف الـ APK (تم التحديث إلى v4 كما طلبت)
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/apk/app-release.apk
