name: Build Flet App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install flet==0.19.0
          pip install flet-builder

      - name: Build Android App
        run: |
          # تنظيف أي بناء سابق لضمان عدم تداخل الأسماء
          rm -rf .flet
          
          # استخدام --product-name للاسم التقني و --display-name للاسم الذي يظهر للمستخدم
          # وضعنا الاسم باللغة العربية هنا
          flet build apk --product-name "MyArabicApp" --display-name "تطبيقي"

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: app-release
          path: build/apk/app-release.apk
